name: Deploy to Hostinger

# Builds the static Next.js export and uploads ./out to Hostinger over FTP.
# Mirrors the standard "Hello World on Hostinger via GitHub Actions" setup:
# build in CI, then SamKirkland/FTP-Deploy-Action syncs the built files.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER     - FTP host from Hostinger hPanel → Files → FTP Accounts
#                    (e.g. ftp.drashishlaparoscopy.com or the server IP)
#   FTP_USERNAME   - FTP account username
#   FTP_PASSWORD   - FTP account password
# Optional:
#   FTP_REMOTE_DIR - target web-root directory. Defaults to ./public_html/.
#                    For an addon/secondary domain it is usually
#                    ./domains/drashishlaparoscopy.com/public_html/

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  # Don't kill an in-progress upload mid-transfer (that leaves the site un-updated).
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (Next.js export → ./out)
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      # lftp mirror uploads in parallel and is far more resilient to Hostinger's
      # FTP timeouts than single-connection actions. Wrapped in a retry so a
      # transient drop just re-runs instead of failing the whole deploy.
      - name: Deploy ./out to Hostinger via FTP (parallel + retries)
        uses: nick-fields/retry@v3
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR != '' && secrets.FTP_REMOTE_DIR || '.' }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<LFTP
            set cmd:fail-exit yes
            set ftp:ssl-allow true
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate yes
            set net:timeout 15
            set net:max-retries 3
            set net:reconnect-interval-base 5
            set mirror:parallel-transfer-count 3
            mirror -R --delete --verbose --exclude-glob .git* ./out/ "$FTP_REMOTE_DIR"
            bye
            LFTP

      # Cache-bust after deploy so changes are visible immediately.
      # HTML is already sent `no-cache` by public/.htaccess (LiteSpeed + browsers).
      # This step additionally purges Cloudflare — it only runs if you put your
      # site behind Cloudflare and add CF_ZONE_ID + CF_API_TOKEN repo secrets;
      # otherwise it is skipped harmlessly.
      - name: Purge Cloudflare cache (if configured)
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ZONE_ID != '' }}
        run: |
          echo "Purging Cloudflare cache for zone $CF_ZONE_ID…"
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo ""
